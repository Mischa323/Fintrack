version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/finance.db
      PORT: 3001
      NODE_ENV: production
    networks:
      - finance-net
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: finance-frontend
    restart: unless-stopped
    networks:
      - finance-net

  nginx:
    image: nginx:alpine
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - finance-net
    labels:
      - "traefik.enable=true"

volumes:
  db_data:
  uploads_data:

networks:
  finance-net:
    driver: bridge
