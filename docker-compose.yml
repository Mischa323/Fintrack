version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-finance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance_secret}
      POSTGRES_DB: ${DB_NAME:-financetracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-finance}:${DB_PASSWORD:-finance_secret}@postgres:5432/${DB_NAME:-financetracker}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: finance-frontend
    restart: unless-stopped
    networks:
      - finance-net

  nginx:
    image: nginx:alpine
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - finance-net
    labels:
      - "traefik.enable=true"

volumes:
  postgres_data:
  uploads_data:

networks:
  finance-net:
    driver: bridge
