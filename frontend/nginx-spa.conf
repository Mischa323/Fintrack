upstream backend {
  server backend:3001;
}

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Large enough for CSV imports and .db backup restores
  client_max_body_size 50M;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Proxy API calls to the backend service on the compose network.
  # Only used when the frontend is exposed directly (no separate nginx service).
  location /api/ {
    proxy_pass http://backend/;
    # Imports and backup restores can take a while; 60s (the default) is too low
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
